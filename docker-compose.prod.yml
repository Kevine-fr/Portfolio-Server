# Production overrides — usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  backend:
    build:
      target: runner       # production stage (built JS, non-root, smaller)
    volumes: []            # no live source mount in prod
    environment:
      NODE_ENV: production

  admin:
    build:
      target: runner
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
    volumes: []
    environment:
      NODE_ENV: production
